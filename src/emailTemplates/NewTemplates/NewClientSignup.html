<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>New Client Signed Up</title>
</head>

<body
  style="margin: 0; padding: 0; font-family:'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #F7F7F7; color: #484848;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0"
    style="background-color: #F7F7F7; padding: 40px 20px;">
    <tr>
      <td align="center">
        <table width="600"
          style="background: linear-gradient(143deg, #FFFCF6 22.58%, #F8E5C7 188.59%); border: 1px solid rgba(232, 209, 171, 0.3); border-radius: 24px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.04);">

          <!-- Beige Logo -->
          <tr>
            <td align="center" style="padding: 40px 0 36px;">
              <div
                style="display: inline-block; border: 1px solid rgba(232, 209, 171, 0.4); padding: 12px 32px; border-radius: 100px; background-color: #FFFFFF; box-shadow: 0 8px 24px 0 rgba(149, 157, 165, 0.20);">
                <img src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/logos/beige_logo_vb.png"
                  alt="Beige" width="110" style="display: block; border: 0;">
              </div>
              <div style="padding: 36px 40px 0;">
                <img
                  src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/HorizontalSeparator.png"
                  alt="Line Separator" width="100%" style="display: block; border: 0;">
              </div>
            </td>
          </tr>

          <!-- Header -->
          <tr>
            <td style="padding: 0 40px; text-align: center;">
              <h1 style="margin: 0; color: #000000; font-size: 50px; font-weight: 500; letter-spacing: 1px;">New Client
                Signed Up</h1>
              <p style="margin: 16px 0 0; font-size: 30px; color: #707070; line-height: 1.3;">
                A new user has registered on the Beige platform.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding: 53px 40px 60px;">
              <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%"
                style="font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;">
                <tr>
                  <td align="center"
                    style="padding: 0; background-image: url('https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/ScallopTopReceiptBg.png'); background-repeat: no-repeat; background-position: top center; background-size: 100% auto;  border-radius: 0 0 48px 48px;">

                    <!-- Client Details -->
                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                      <tr>
                        <td align="center" style="padding: 60px 30px 40px;">
                          <h2 style="margin: 0 0 25px 0; font-size: 30px; font-weight: 600; color: #000000;">Client
                            Details</h2>
                          <table border="0" cellpadding="0" cellspacing="0" width="100%"
                            style="background-color: #ffffff; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); padding: 30px 30px 0;">
                            <tr>
                              <!-- <td style="padding-bottom: 20px;"> -->
                              <td >
                                <table width="100%" cellpadding="0" cellspacing="0">
                                  <tr>
                                    <td width="100" style="padding-right: 0;">
                                      <div
                                        style="width: 111px; height: 111px; background-image: url('https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/IconBg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; text-align: center;">
                                        <img
                                          src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/User.svg"
                                          width="40" height="40" style="margin-top: 25px; margin-right: 18px; display: inline-block;">
                                      </div>
                                    </td>
                                    <td>
                                      <p style="margin: 0; font-size: 16px; color: #525252; font-weight: 300;">Name</p>
                                      <p style="margin: 2px 0 0; font-size: 18px; font-weight: 600; color: #000;">{{name}}</p>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <tr>
                              <td height="1" style="background-color: #EDEDED; padding: 0;"></td>
                            </tr>

                            <tr>
                              <td style="padding: 20px 0 0;">
                                <table width="100%" cellpadding="0" cellspacing="0">
                                  <tr>
                                    <td width="76" style="padding-right: 0;">
                                      <div
                                        style="width: 111px; height: 111px; background-image: url('https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/IconBg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; text-align: center;">
                                        <img
                                          src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/Email.svg"
                                          width="40" height="40" style="margin-top: 25px; margin-right: 18px; display: inline-block;">
                                      </div>
                                    </td>
                                    <td>
                                      <p style="margin: 0; font-size: 16px; color: #525252; font-weight: 300;">Email</p>
                                      <p style="margin: 2px 0 0; font-size: 18px; font-weight: 600; color: #000;">
                                        {{email}}</p>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <tr>
                              <td height="1" style="background-color: #EDEDED; padding: 0;"></td>
                            </tr>

                            <tr>
                              <td style="padding: 20px 0 0;">
                                <table width="100%" cellpadding="0" cellspacing="0">
                                  <tr>
                                    <td width="76" style="padding-right: 0;">
                                      <div
                                       style="width: 111px; height: 111px; background-image: url('https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/IconBg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; text-align: center;">
                                        <img
                                          src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/contactphone.svg"
                                          width="40" height="40" style="margin-top: 25px; margin-right: 18px; display: inline-block;">
                                      </div>
                                    </td>
                                    <td>
                                      <p style="margin: 0; font-size: 16px; color: #525252; font-weight: 300;">Contact
                                        Number</p>
                                      <p style="margin: 2px 0 0; font-size: 18px; font-weight: 600; color: #000;">
                                        {{phone_number}}</p>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                            <tr>
                              <td height="1" style="background-color: #EDEDED; padding: 0;"></td>
                            </tr>

                            <tr>
                              <td style="padding-top: 20px;">
                                <table width="100%" cellpadding="0" cellspacing="0">
                                  <tr>
                                    <td width="76" style="padding-right: 0;">
                                      <div
                                        style="width: 111px; height: 111px; background-image: url('https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/IconBg.png'); background-size: cover; background-repeat: no-repeat; background-position: center; text-align: center;">
                                        <img
                                          src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/Instagram.png"
                                          width="40" height="40" style="margin-top: 25px; margin-right: 18px; display: inline-block;">
                                      </div>
                                    </td>
                                    <td>
                                      <p style="margin: 0; font-size: 16px; color: #525252; font-weight: 300;">Instagram
                                      </p>
                                      <p style="margin: 2px 0 0; font-size: 18px; font-weight: 600; color: #000;">
                                        {{instagram}}</p>
                                    </td>
                                  </tr>
                                </table>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <!-- Floating button -->
                    <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="margin-bottom: -30px;">
                      <tr>
                        <td align="center">
                          <div style="line-height: 0;">
                            <table role="presentation" border="0" cellpadding="0" cellspacing="0">
                              <tr>
                                <td align="center" bgcolor="#000000"
                                  style="border-radius: 100px; padding: 18px 40px; box-shadow: 0 10px 20px rgba(0,0,0,0.15);">
                                  <a href="{{loginUrl}}" target="_blank"
                                    style="font-size: 18px; font-weight: 600; color: #E8D1AB; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; display: inline-block;">
                                    Open Admin Panel &rarr;
                                  </a>
                                </td>
                              </tr>
                            </table>
                          </div>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding: 30px 40px;">
              <div style="padding-bottom: 48px;">
                <img
                  src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/HorizontalSeparator.png"
                  alt="Line Separator" width="100%" style="display: block; border: 0;">
              </div>
              <p style="margin: 0 0 20px; font-size: 16px; color: #3C3B3B;">
                Help Center &nbsp;&bull;&nbsp; Term of Services &nbsp;&bull;&nbsp; Privacy Policy
              </p>
              <p style="margin: 0 0 60px; color: #000000; font-size: 26px;font-weight: 600;">
                Beige AI
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>

</html>
