
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>New Client Signed Up</title>
</head>

<body style="margin: 0; padding: 0; background-color: #F7F7F7;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
    style="width: 100%; margin: 0; padding: 0; background-color: #F7F7F7;">
    <tr>
      <td align="center" style="padding: 32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
          style="width: 100%; max-width: 600px; background-color: #FFFCF6; background-image: linear-gradient(143deg, #FFFCF6 22.58%, #F8E5C7 188.59%); border: 1px solid rgba(232, 209, 171, 0.3); border-radius: 24px;">

          <tr>
            <td align="center" style="padding: 28px 20px 0;">
              <table role="presentation" width="320" cellpadding="0" cellspacing="0" border="0"
                style="width: 320px; max-width: 100%; margin: 0 auto;">
                <tr>
                  <td align="center"
                    style="padding: 18px 24px 16px; background-color: #FFF9F0; border: 1px solid #EAD9BE; border-radius: 18px;">
                    <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center"
                          style="padding: 8px 24px; background-color: #FFFFFF; border: 1px solid rgba(232, 209, 171, 0.55); border-radius: 999px; box-shadow: 0 8px 24px rgba(149, 157, 165, 0.12);">
                          <img src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/logos/beige_logo_vb.png"
                            alt="Beige" width="72" style="display: block; border: 0;">
                        </td>
                      </tr>
                    </table>

                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td style="padding: 16px 0 0;">
                          <img
                            src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/HorizontalSeparator.png"
                            alt="" width="100%" style="display: block; width: 100%; border: 0;">
                        </td>
                      </tr>
                    </table>

                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding: 22px 8px 0;">
                          <h1
                            style="margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 22px; line-height: 28px; font-weight: 600; color: #111111;">
                            New Client Signed Up
                          </h1>
                          <p
                            style="margin: 12px 0 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; line-height: 20px; font-weight: 400; color: #6D6D6D;">
                            A new user has registered on the Beige platform.
                          </p>
                        </td>
                      </tr>
                    </table>

                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                      <tr>
                        <td align="center" style="padding-top: 20px; font-size: 0; line-height: 0;">
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                          <span
                            style="display: inline-block; width: 18px; height: 18px; border-radius: 50%; background-color: #FFFFFF; margin: 0 1px;"></span>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 18px 20px 0;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                style="width: 100%; background-color: #FEF0D8; border-radius: 28px;">
                <tr>
                  <td align="center" style="padding: 24px 14px 26px;">
                    <h2
                      style="margin: 0 0 18px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; line-height: 18px; font-weight: 700; color: #111111;">
                      Client Details
                    </h2>

                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"
                      style="width: 100%; background-color: #FFFFFF; border-radius: 20px;">
                      <tr>
                        <td style="padding: 18px 18px 8px;">
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="52" valign="top" style="width: 52px; padding-right: 12px;">
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                  <tr>
                                    <td align="center" valign="middle"
                                      style="width: 40px; height: 40px; background-color: #F6E6C8; border-radius: 50%;">
                                      <img
                                        src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/User.svg"
                                        alt="Name" width="18" height="18" style="display: block; border: 0; margin: 0 auto;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td valign="middle"
                                style="font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding-bottom: 10px;">
                                <p style="margin: 0 0 4px; font-size: 10px; line-height: 14px; color: #7E7E7E;">Name</p>
                                <p style="margin: 0; font-size: 12px; line-height: 16px; font-weight: 600; color: #111111;">
                                  {{name}}
                                </p>
                              </td>
                            </tr>
                          </table>
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="border-top: 1px solid #E8E1D5; font-size: 1px; line-height: 1px;">&nbsp;</td>
                            </tr>
                          </table>

                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="52" valign="top" style="width: 52px; padding: 14px 12px 0 0;">
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                  <tr>
                                    <td align="center" valign="middle"
                                      style="width: 40px; height: 40px; background-color: #F6E6C8; border-radius: 50%;">
                                      <img
                                        src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/Email.svg"
                                        alt="Email" width="18" height="18" style="display: block; border: 0; margin: 0 auto;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td valign="middle"
                                style="font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 14px 0 10px;">
                                <p style="margin: 0 0 4px; font-size: 10px; line-height: 14px; color: #7E7E7E;">Email</p>
                                <p style="margin: 0; font-size: 12px; line-height: 16px; font-weight: 600; color: #111111;">
                                  {{email}}
                                </p>
                              </td>
                            </tr>
                          </table>
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="border-top: 1px solid #E8E1D5; font-size: 1px; line-height: 1px;">&nbsp;</td>
                            </tr>
                          </table>

                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="52" valign="top" style="width: 52px; padding: 14px 12px 0 0;">
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                  <tr>
                                    <td align="center" valign="middle"
                                      style="width: 40px; height: 40px; background-color: #F6E6C8; border-radius: 50%;">
                                      <img
                                        src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/contactphone.svg"
                                        alt="Contact Number" width="18" height="18"
                                        style="display: block; border: 0; margin: 0 auto;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td valign="middle"
                                style="font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 14px 0 10px;">
                                <p style="margin: 0 0 4px; font-size: 10px; line-height: 14px; color: #7E7E7E;">Contact Number</p>
                                <p style="margin: 0; font-size: 12px; line-height: 16px; font-weight: 600; color: #111111;">
                                  {{phone_number}}
                                </p>
                              </td>
                            </tr>
                          </table>
                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td style="border-top: 1px solid #E8E1D5; font-size: 1px; line-height: 1px;">&nbsp;</td>
                            </tr>
                          </table>

                          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                            <tr>
                              <td width="52" valign="top" style="width: 52px; padding: 14px 12px 0 0;">
                                <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                                  <tr>
                                    <td align="center" valign="middle"
                                      style="width: 40px; height: 40px; background-color: #F6E6C8; border-radius: 50%;">
                                      <img
                                        src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/Instagram.png"
                                        alt="Instagram" width="18" height="18"
                                        style="display: block; border: 0; margin: 0 auto;">
                                    </td>
                                  </tr>
                                </table>
                              </td>
                              <td valign="middle"
                                style="font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 14px 0 6px;">
                                <p style="margin: 0 0 4px; font-size: 10px; line-height: 14px; color: #7E7E7E;">Instagram</p>
                                <p style="margin: 0; font-size: 12px; line-height: 16px; font-weight: 600; color: #111111;">
                                  {{instagram}}
                                </p>
                              </td>
                            </tr>
                          </table>
                        </td>
                      </tr>
                    </table>

                    <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin: 18px auto 0;">
                      <tr>
                        <td align="center" bgcolor="#000000" style="border-radius: 999px;">
                          <a href="{{loginUrl}}" target="_blank"
                            style="display: inline-block; padding: 14px 22px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 14px; font-weight: 700; color: #E8D1AB; text-decoration: none; text-transform: uppercase;">
                            Open Admin Panel &rarr;
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding: 32px 24px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td>
                    <img
                      src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/email_assets/HorizontalSeparator.png"

                  </td>
                </tr>
              </table>
              <p
                style="margin: 20px 0 14px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 11px; line-height: 16px; color: #3C3B3B;">
                Help Center &nbsp;&bull;&nbsp; Term of Services &nbsp;&bull;&nbsp; Privacy Policy
              </p>
              <p
                style="margin: 0 0 28px; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 20px; line-height: 24px; font-weight: 600; color: #111111;">
                Beige AI
              </p>
              <table role="presentation" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td
                    style="padding: 8px 24px; background-color: #FFFFFF; border: 1px solid rgba(232, 209, 171, 0.55); border-radius: 999px;">
                    <img src="https://beige-web-prod.s3.us-east-1.amazonaws.com/beige/assets/logos/beige_logo_vb.png"
                      alt="Beige" width="72" style="display: block; border: 0;">
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
